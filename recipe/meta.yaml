{% set name = "mlconjug3" %}
{% set version = "4.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/mlconjug3-{{ version }}.tar.gz
  sha256: e589f9db9e02ff61b586025937c8ec6ec8df6df49177bc20392287e03a78be13

build:
  number: 0
  noarch: python
  entry_points:
    - mlconjug3=mlconjug3.cli:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
    - wheel

  run:
    - python >=3.9,<4.0

    # core dependencies
    - click >=8.1,<9
    - defusedxml
    - joblib >=1.2,<2
    - numpy >=1.26,<2

    # ML backend (IMPORTANT: tighter bound for conda-forge stability)
    - scikit-learn >=1.3,<1.8

    # utilities
    - rich >=13,<14
    - pyyaml >=6,<7
    - tomlkit >=0.11,<1

test:
  imports:
    - mlconjug3

  commands:
    - pip check
    - python -c "import mlconjug3"

  requires:
    - pip

about:
  home: https://github.com/SekouDiaoNlp/mlconjug3
  summary: A Python library to conjugate French, English, Spanish, Italian, Portuguese and Romanian verbs using Machine Learning techniques.
  license: MIT
  license_file: LICENSE

  description: |
    A Command Line application and Python library to conjugate verbs in French, English, Spanish, Italian, Portuguese and Romanian using Machine Learning techniques.

    mlconjug3 can conjugate known and unseen verbs using pre-trained machine learning models.

    FEATURES:
    - CLI tool
    - Python API
    - ML-based conjugation
    - 6 language support
    - extensible training pipeline

    Documentation: https://mlconjug3.readthedocs.io

  doc_url: https://mlconjug3.readthedocs.io/en/latest/
  dev_url: https://github.com/SekouDiaoNlp/mlconjug3

extra:
  recipe-maintainers:
    - SekouDiaoNlp